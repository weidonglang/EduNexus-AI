spring.application.name=academic-ai-service
server.port=${AI_SERVICE_PORT:8090}

spring.cloud.nacos.discovery.server-addr=${NACOS_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}
spring.cloud.nacos.discovery.register-enabled=${NACOS_REGISTER_ENABLED:${NACOS_DISCOVERY_ENABLED:false}}

spring.datasource.url=${DB_URL:jdbc:h2:mem:edunexus_ai;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

seata.enabled=${SEATA_ENABLED:false}
seata.application-id=${spring.application.name}
seata.tx-service-group=${SEATA_TX_GROUP:edunexus_tx_group}
seata.service.vgroup-mapping.edunexus_tx_group=${SEATA_CLUSTER:default}
seata.service.grouplist.default=${SEATA_SERVER_ADDR:127.0.0.1:8091}
seata.data-source-proxy-mode=AT

ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.chat-model=${OLLAMA_CHAT_MODEL:qwen3:8b}
ollama.sql-model=${OLLAMA_SQL_MODEL:qwen2.5-coder:7b}
ollama.enabled=${OLLAMA_ENABLED:false}
