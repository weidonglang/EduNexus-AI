name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test backend
        run: .\mvnw.cmd test

      - name: Test AI service
        working-directory: ai-service
        run: ..\mvnw.cmd -f pom.xml test
