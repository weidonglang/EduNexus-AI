spring.application.name=academic-main

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tianshiwebside?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.encoding=UTF-8
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

mybatis.configuration.map-underscore-to-camel-case=true

course-grab.remote.enabled=${COURSE_GRAB_REMOTE_ENABLED:false}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

app.security.access-token-ttl=30m
app.security.refresh-token-ttl=7d

app.ai-service.base-url=${AI_SERVICE_URL:http://localhost:8090}
app.ai-service.name=${AI_SERVICE_NAME:academic-ai-service}
app.ai-service.discovery-enabled=${AI_SERVICE_DISCOVERY_ENABLED:${NACOS_DISCOVERY_ENABLED:false}}

spring.cloud.nacos.discovery.server-addr=${NACOS_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}
spring.cloud.nacos.discovery.register-enabled=${NACOS_REGISTER_ENABLED:${NACOS_DISCOVERY_ENABLED:false}}
spring.cloud.openfeign.client.config.default.connect-timeout=${AI_SERVICE_CONNECT_TIMEOUT_MS:3000}
spring.cloud.openfeign.client.config.default.read-timeout=${AI_SERVICE_READ_TIMEOUT_MS:90000}

app.upload-root=${UPLOAD_ROOT:uploads}
app.upload.max-size-bytes=${UPLOAD_MAX_SIZE_BYTES:10485760}
app.upload.allowed-extensions=${UPLOAD_ALLOWED_EXTENSIONS:pdf,jpg,jpeg,png,doc,docx,xls,xlsx}
app.upload.allowed-content-types=${UPLOAD_ALLOWED_CONTENT_TYPES:application/pdf,image/jpeg,image/png,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
