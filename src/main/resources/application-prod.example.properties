# Copy this file to application-prod.properties or provide the same values as environment variables.
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tianshiwebside?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:CHANGE_ME}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

app.ai-service.base-url=${AI_SERVICE_URL:http://localhost:8090}
app.upload-root=${UPLOAD_ROOT:uploads}
app.security.access-token-ttl=${ACCESS_TOKEN_TTL:PT2H}
app.security.refresh-token-ttl=${REFRESH_TOKEN_TTL:P7D}

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
